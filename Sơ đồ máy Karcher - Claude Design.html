<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sơ đồ Vận Hành Làm Sạch Kärcher - HAUS (Claude Design Blueprint)</title>
    
    <!-- 1. Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Babel for runtime JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- CSS Tùy chỉnh (Đồng bộ từ index.css) -->
    <style>
        :root {
            --bg-deep: #000428;
            --bg-mid: #004e92;
            --accent-yellow: #FFED00;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --glass-bg: rgba(0, 78, 146, 0.25);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            margin: 0; padding: 0;
        }

        /* Animated Background Blobs */
        .bg-animated {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);
            overflow: hidden;
        }
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.3;
            animation: float 20s infinite alternate ease-in-out;
        }
        .blob-1 { top: -20%; left: -10%; width: 70vw; height: 70vw; background: #004e92; animation-duration: 30s; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #000428; animation-duration: 35s; animation-direction: alternate-reverse; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.05); }
        }
        
        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        
        .machine-card-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }
        .machine-card-glass:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3);
        }

        /* Karcher Yellow Logo Box */
        .karcher-logo-box {
            background-color: var(--accent-yellow);
            color: #000;
            font-weight: 900;
            letter-spacing: -0.03em;
            padding: 2px 10px;
            font-size: 1.4rem;
            line-height: 1;
            border-radius: 2px;
            display: inline-block;
            transform: skew(-12deg);
            box-shadow: 3px 3px 0px rgba(0,0,0,0.4);
        }
        .karcher-logo-box span { display: inline-block; transform: skew(12deg); }

        /* Highlight classes */
        .special-highlight {
            box-shadow: 0 0 0 1px var(--accent-yellow), 0 0 15px rgba(255, 237, 0, 0.4);
            border-color: var(--accent-yellow) !important;
            z-index: 10;
            background: rgba(255, 237, 0, 0.1) !important;
        }
        
        .area-selected {
            background: rgba(255, 237, 0, 0.2) !important;
            border-color: var(--accent-yellow) !important;
            box-shadow: 0 0 15px rgba(255, 237, 0, 0.2);
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Description Bar */
        .desc-bar {
            background: rgba(0, 4, 40, 0.6);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        /* AI Chat Window Styles */
        .ai-chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 350px;
            height: 450px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 237, 0, 0.3);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 100;
            overflow: hidden;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .ai-header {
            background: linear-gradient(90deg, #FFED00, #F59E0B);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #000;
        }
        
        .ai-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0,0,0,0.2);
        }
        
        .ai-message {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.4;
            max-width: 85%;
            word-wrap: break-word;
        }
        
        .ai-message.bot {
            background: rgba(255,255,255,0.15);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            color: #fff;
        }
        
        .ai-message.user {
            background: rgba(255, 237, 0, 0.2);
            border: 1px solid rgba(255, 237, 0, 0.3);
            color: #FFED00;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-footer {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .glass-modal {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.55);
        }

        .text-fluid-title { font-size: clamp(1rem, 2vmin, 1.8rem); }
        .text-accent-yellow { color: #FFED00; }
    </style>
</head>

        // ==========================================

        const GlassPanel = ({ children, className = "", onClick, hoverable = false }) => (
            <div 
                onClick={onClick}

                style={{ backgroundColor: 'rgba(0, 78, 146, 0.15)', borderColor: 'rgba(255, 255, 255, 0.1)' }}

                {children}
            </div>
        );

        const Button = ({ children, onClick, className = "", variant = "secondary", disabled = false, type = "button" }) => {
            const getVariantStyles = () => {
                switch (variant) {
                    case 'primary': return 'bg-yellow-400 text-black border-yellow-400 hover:bg-yellow-300 hover:shadow-[0_0_15px_rgba(250,204,21,0.5)]';
                    case 'danger': return 'bg-red-600/80 text-white border-red-500 hover:bg-red-600';
                    case 'ghost': return 'bg-transparent text-slate-300 border-transparent hover:bg-white/10 hover:text-white';
                    default: return 'bg-slate-800/80 text-slate-300 border-slate-700 hover:bg-slate-700 hover:text-white';
                }
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`flex items-center justify-center gap-2 px-4 py-2 text-xs font-bold uppercase tracking-wider border rounded-xl transition-all duration-300 cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed ${getVariantStyles()} ${className}`}>
                    {children}
                </button>
            );
        };

        // ==========================================
        // --- 4. MAIN APP LAYOUT -------------------
        // ==========================================
        const App = () => {
            // Context Mock Database States
            const [packages, setPackages] = useState(initialPackages);
            const [areas, setAreas] = useState(initialAreas);
            const [machines, setMachines] = useState(initialMachines);
            const [chemicals, setChemicals] = useState(initialChemicals);
            const [tools, setTools] = useState(initialTools);
            const [mappings, setMappings] = useState(initialMappings);

            // UI States
            const [activePackage, setActivePackage] = useState(null);
            const [hoveredArea, setHoveredArea] = useState(null);
            const [selectedMachineId, setSelectedMachineId] = useState(null);
            const [selectedChemicalId, setSelectedChemicalId] = useState(null);
            const [selectedToolId, setSelectedToolId] = useState(null);

            // Modals & Auth
            const [showLogin, setShowLogin] = useState(false);
            const [showConfig, setShowConfig] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);

            // AI Assistant Chat States
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { id: 1, text: "Xin chào! Tôi là trợ lý ảo Karcher. Bạn cần tư vấn về thiết bị, hóa chất hay quy trình làm sạch nào?", sender: 'bot' }
            ]);
            const [input, setInput] = useState('');

            const handleSend = () => {
                if (!input.trim()) return;
                const userMsg = { id: Date.now(), text: input, sender: 'user' };
                setMessages((prev) => [...prev, userMsg]);
                setInput('');

                setTimeout(() => {
                    const response = "Tính năng Kärcher AI này đang được kết nối với NotebookLM của HAUS. Vui lòng bấm vào biểu tượng liên kết tròn ở trên nút chat để truy cập nguồn dữ liệu chi tiết của chúng tôi.";
                    setMessages((prev) => [
                        ...prev,
                        { id: Date.now() + 1, text: response, sender: 'bot' }
                    ]);
                }, 1000);
            };
            
            // Connection SVG Lines
            const containerRef = useRef(null);
            const [lines, setLines] = useState([]);

            // Monitor state connections
            const flowActiveEntities = useMemo(() => {
                const activeMachineIds = new Set();
                const activeChemicalIds = new Set();
                const activeToolIds = new Set();

                if (activePackage) {
                    if (activePackage === 'theo-gio') {
                        machines.forEach(m => activeMachineIds.add(m.id));
                        chemicals.forEach(c => activeChemicalIds.add(c.id));
                        tools.forEach(t => activeToolIds.add(t.id));
                    } else {
                        const targetMappings = mappings.filter(m => m.packageId === activePackage && (!hoveredArea || m.areaId === hoveredArea));
                        targetMappings.forEach((m) => {
                            activeMachineIds.add(m.machineId);
                            m.chemicalIds?.forEach(cid => activeChemicalIds.add(cid));
                            m.toolIds?.forEach(tid => activeToolIds.add(tid));
                        });
                    }
                } else if (selectedMachineId) {
                    activeMachineIds.add(selectedMachineId);
                    mappings.filter(m => m.machineId === selectedMachineId).forEach((m) => {
                        m.chemicalIds?.forEach(cid => activeChemicalIds.add(cid));
                        m.toolIds?.forEach(tid => activeToolIds.add(tid));
                    });
                } else if (selectedChemicalId) {
                    activeChemicalIds.add(selectedChemicalId);
                    mappings.filter(m => m.chemicalIds?.includes(selectedChemicalId)).forEach((m) => {
                        activeMachineIds.add(m.machineId);
                        m.toolIds?.forEach(tid => activeToolIds.add(tid));
                    });
                } else if (selectedToolId) {
                    activeToolIds.add(selectedToolId);
                    mappings.filter(m => m.toolIds?.includes(selectedToolId)).forEach((m) => {
                        activeMachineIds.add(m.machineId);
                        m.chemicalIds?.forEach(cid => activeChemicalIds.add(cid));
                    });
                }

                return { machineIds: activeMachineIds, chemicalIds: activeChemicalIds, toolIds: activeToolIds };
            }, [activePackage, hoveredArea, selectedMachineId, selectedChemicalId, selectedToolId, mappings, machines, chemicals, tools]);

            // Bezier SVG Math Coords
            const calculateLines = () => {
                if (!containerRef.current) return;
                const containerRect = containerRef.current.getBoundingClientRect();
                const newLines = [];

                const getElCoords = (elId, edge) => {
                    const el = document.getElementById(elId);
                    if (!el) return null;
                    const rect = el.getBoundingClientRect();
                    return {
                        x: edge === 'left' ? rect.left - containerRect.left : rect.right - containerRect.left,
                        y: rect.top + rect.height / 2 - containerRect.top
                    };
                };

                if (!activePackage && !selectedMachineId && !selectedChemicalId && !selectedToolId) {
                    setLines([]);
                    return;
                }

                // Render Package flow
                if (activePackage && activePackage !== 'theo-gio') {
                    const activeMappings = mappings.filter(m => m.packageId === activePackage);
                    
                    areas.forEach((area) => {
                        const areaCoords = getElCoords(`area-${area.id}`, 'right');
                        if (!areaCoords) return;

                        const areaMappings = activeMappings.filter(m => m.areaId === area.id);
                        const isAreaFocused = hoveredArea === area.id;
                        const isSomeAreaFocused = !!hoveredArea;

                        areaMappings.forEach((m) => {
                            const machineCoords = getElCoords(`machine-${m.machineId}`, 'left');
                            if (!machineCoords) return;

                            const isFlowing = isAreaFocused;
                            const pkgColor = packages.find(p => p.id === activePackage)?.color || '#3B82F6';
                            let opacity = isAreaFocused ? 0.95 : isSomeAreaFocused ? 0.03 : 0.2;
                            let width = isAreaFocused ? 2.5 : isSomeAreaFocused ? 0.5 : 1.2;

                            // Area -> Machine
                            newLines.push({
                                id: `a-m-${m.id}`, startX: areaCoords.x, startY: areaCoords.y,
                                endX: machineCoords.x, endY: machineCoords.y, stroke: pkgColor,
                                width, opacity, isFlowing
                            });

                            const machineRight = getElCoords(`machine-${m.machineId}`, 'right');
                            if (machineRight && isAreaFocused) {
                                // Machine -> Chemical
                                m.chemicalIds?.forEach((cid) => {
                                    const chemCoords = getElCoords(`chemical-${cid}`, 'left');
                                    if (!chemCoords) return;

                                    newLines.push({
                                        id: `m-c-${m.id}-${cid}`, startX: machineRight.x, startY: machineRight.y,
                                        endX: chemCoords.x, endY: chemCoords.y, stroke: pkgColor,
                                        width, opacity, isFlowing
                                    });

                                    // Chemical -> Tool
                                    const chemRight = getElCoords(`chemical-${cid}`, 'right');
                                    if (chemRight) {
                                        m.toolIds?.forEach((tid) => {
                                            const toolCoords = getElCoords(`tool-${tid}`, 'left');
                                            if (!toolCoords) return;

                                            newLines.push({
                                                id: `c-t-${m.id}-${cid}-${tid}`, startX: chemRight.x, startY: chemRight.y,
                                                endX: toolCoords.x, endY: toolCoords.y, stroke: pkgColor,
                                                width, opacity, isFlowing
                                            });
                                        });
                                    }
                                });
                            }
                        });
                    });
                }

                // Render specific selection connections
                if (!activePackage && selectedMachineId) {
                    const activeMappings = mappings.filter(m => m.machineId === selectedMachineId);
                    const machineLeft = getElCoords(`machine-${selectedMachineId}`, 'left');
                    const machineRight = getElCoords(`machine-${selectedMachineId}`, 'right');

                    activeMappings.forEach((m) => {
                        const areaCoords = getElCoords(`area-${m.areaId}`, 'right');
                        if (areaCoords && machineLeft) {
                            newLines.push({
                                id: `sel-a-m-${m.id}`, startX: areaCoords.x, startY: areaCoords.y,
                                endX: machineLeft.x, endY: machineLeft.y, stroke: '#FFED00',
                                width: 2.2, opacity: 0.9, isFlowing: true
                            });
                        }
                        if (machineRight) {
                            m.chemicalIds?.forEach((cid) => {
                                const chemCoords = getElCoords(`chemical-${cid}`, 'left');
                                if (chemCoords) {
                                    newLines.push({
                                        id: `sel-m-c-${m.id}-${cid}`, startX: machineRight.x, startY: machineRight.y,
                                        endX: chemCoords.x, endY: chemCoords.y, stroke: '#FFED00',
                                        width: 2.2, opacity: 0.9, isFlowing: true
                                    });

                                    const chemRight = getElCoords(`chemical-${cid}`, 'right');
                                    if (chemRight) {
                                        m.toolIds?.forEach((tid) => {
                                            const toolCoords = getElCoords(`tool-${tid}`, 'left');
                                            if (toolCoords) {
                                                newLines.push({
                                                    id: `sel-c-t-${m.id}-${cid}-${tid}`, startX: chemRight.x, startY: chemRight.y,
                                                    endX: toolCoords.x, endY: toolCoords.y, stroke: '#FFED00',
                                                    width: 2.2, opacity: 0.9, isFlowing: true
                                                });
                                            }
                                        });
                                    }
                                }
                            });
                        }
                    });
                }

                setLines(newLines);
            };

            useEffect(() => {
                const timer = setTimeout(calculateLines, 150);
                window.addEventListener('resize', calculateLines);
                return () => {
                    window.removeEventListener('resize', calculateLines);
                    clearTimeout(timer);
                };
            }, [activePackage, hoveredArea, selectedMachineId, selectedChemicalId, selectedToolId, mappings, machines, chemicals, tools]);

            // Helper lists
            const selectedEntity = 
                machines.find(m => m.id === selectedMachineId) || 
                chemicals.find(c => c.id === selectedChemicalId) || 
                tools.find(t => t.id === selectedToolId);

            // Custom dynamic description and frequency for InfoPanel
            let activeDesc = selectedEntity?.desc;
            let activeFreq = null;
            if (selectedMachineId && activePackage && hoveredArea) {
                const match = mappings.find(m => m.packageId === activePackage && m.areaId === hoveredArea && m.machineId === selectedMachineId);
                if (match) {
                    if (match.description) activeDesc = match.description;
                    if (match.frequency) activeFreq = match.frequency;
                }
            }

            return (
                <div className="h-full flex flex-col relative" onClick={() => { setSelectedMachineId(null); setSelectedChemicalId(null); setSelectedToolId(null); setHoveredArea(null); }}>
                    
                    {/* HEADER COMPONENT */}
                    <header className="flex-none px-6 py-2 flex justify-between items-center glass-panel z-50 border-b border-white/10 h-[8vh]">
                        <div className="flex items-center gap-2">
                            <div className="karcher-logo-box text-sm"><span>KÄRCHER</span></div>
                            <h1 className="text-fluid-title font-black tracking-tight text-white uppercase hidden md:block ml-3">Hệ Thống Thiết Bị Làm Sạch</h1>
                        </div>
                        
                        <div className="flex gap-2 overflow-x-auto custom-scroll mx-4 max-w-[60vw]">
                            {packages.map((pkg) => {
                                const isActive = activePackage === pkg.id;
                                const isRelated = selectedMachineId && mappings.some(m => m.packageId === pkg.id && m.machineId === selectedMachineId);
                                return (
                                    <button
                                        key={pkg.id}
                                        onClick={(e) => { e.stopPropagation(); setActivePackage(prev => prev === pkg.id ? null : pkg.id); setSelectedMachineId(null); setHoveredArea(null); }}
                                        className={`flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-lg border transition-all duration-300 whitespace-nowrap text-xs font-bold uppercase tracking-wider cursor-pointer`}
                                        style={{ 
                                            color: isActive ? '#fff' : (isRelated ? pkg.color : '#94a3b8'), 
                                            borderColor: isActive ? pkg.color : (isRelated ? pkg.color : '#334155'),
                                            backgroundColor: isActive ? 'rgb(37 99 235)' : 'rgba(30, 41, 59, 0.6)'
                                        }}
                                    >
                                        <LucideIcon name={pkg.icon} size={14} />
                                        <span>{pkg.name}</span>
                                    </button>
                                );
                            })}
                        </div>
                        <div className="flex items-center gap-3">
                            {isAdmin ? (
                                <button onClick={(e) => { e.stopPropagation(); setShowConfig(!showConfig); }} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-yellow-400 text-yellow-400 bg-yellow-400/10 text-xs font-bold uppercase tracking-wider cursor-pointer">
                                    <LucideIcon name="Settings" size={14} />
                                    <span>Cấu hình</span>
                                </button>
                            ) : (
                                <button onClick={(e) => { e.stopPropagation(); setShowLogin(true); }} className="p-2 bg-slate-800 border border-slate-700 hover:bg-slate-700 rounded-lg text-slate-400 cursor-pointer">
                                    <LucideIcon name="Lock" size={16} />
                                </button>
                            )}
                        </div>
                    </header>

                    {/* DESCRIPTION BANNER */}
                    <div className={`flex-none desc-bar py-1.5 px-6 text-center h-[4.5vh] flex items-center justify-center border-b border-white/5 relative z-10 ${activePackage ? 'opacity-100' : 'opacity-0'}`}>
                         <span className="text-xs md:text-sm font-semibold text-accent-yellow drop-shadow-md">{activePackage && packages.find(p => p.id === activePackage).desc}</span>
                    </div>

                    {/* FOUR COLUMNS GRID CONTAINER */}
                    <main className="flex-1 relative flex overflow-hidden main-content px-6 py-3 gap-6 z-10" ref={containerRef}>
                        
                        {/* Dynamic Connections SVG */}
                        <svg className="absolute inset-0 w-full h-full pointer-events-none z-0">
                            {lines.map((line, i) => {
                                const dx = Math.abs(line.endX - line.startX);
                                const cp1X = line.startX + dx * 0.4;
                                const cp2X = line.endX - dx * 0.4;
                                const pathD = `M ${line.startX} ${line.startY} C ${cp1X} ${line.startY}, ${cp2X} ${line.endY}, ${line.endX} ${line.endY}`;

                                return (
                                    <g key={i} className="transition-all duration-300">
                                        <path d={pathD} fill="none" stroke={line.stroke} strokeWidth={line.width} strokeOpacity={line.opacity} className={line.isFlowing ? 'flow-line' : ''} />
                                        {line.isFlowing && (
                                            <>
                                                <circle r="3" fill="#FFED00">
                                                    <animateMotion dur="1.8s" repeatCount="indefinite" path={pathD} />
                                                </circle>
                                                <circle r="2.5" fill="#FFED00">
                                                    <animateMotion dur="1.8s" begin="0.6s" repeatCount="indefinite" path={pathD} />
                                                </circle>
                                            </>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>

                        {/* COL 1: AREAS - w-[18%] */}
                        <div className="w-[18%] flex flex-col justify-center gap-[0.8vh] z-10 custom-scroll overflow-y-auto pr-1" onClick={e => e.stopPropagation()}>
                            <div className="flex items-center gap-2 px-2 text-blue-300 mb-1 border-b border-white/5 pb-1 flex-none">
                                <LucideIcon name="MapPin" size={16} />
                                <h3 className="text-xs font-black uppercase tracking-widest text-slate-200">Khu vực</h3>
                            </div>
                            {areas.map((area) => {
                                const isActive = hoveredArea === area.id;
                                const isConnected = activePackage && mappings.some(m => m.packageId === activePackage && m.areaId === area.id);
                                let isDimmed = activePackage && activePackage !== 'theo-gio' && (!isConnected || (hoveredArea && hoveredArea !== area.id));

                                return (
                                    <div
                                        key={area.id}
                                        id={`area-${area.id}`}
                                        onMouseEnter={() => activePackage && activePackage !== 'theo-gio' && setHoveredArea(area.id)}
                                        onMouseLeave={() => activePackage && setHoveredArea(null)}
                                        onClick={() => activePackage && activePackage !== 'theo-gio' && setHoveredArea(prev => prev === area.id ? null : area.id)}
                                        className={`group px-3 py-2 rounded-xl border transition-all duration-300 cursor-pointer flex items-center justify-between select-none ${isActive ? 'bg-blue-900/40 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.3)] translate-x-1.5 area-selected' : 'bg-slate-800/40 border-slate-700 hover:bg-slate-800/80'} ${isDimmed ? 'opacity-20 blur-[0.5px]' : 'opacity-100'}`}
                                        style={{ height: '7vh' }}
                                    >
                                        <div className="flex items-center gap-3 w-full">
                                            <div className={`p-1.5 rounded-lg shrink-0 ${isActive ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400'}`}>
                                                <LucideIcon name={area.icon} size={18} />
                                            </div>
                                            <span className={`text-xs font-bold uppercase tracking-wide truncate ${isActive ? 'text-yellow-300' : 'text-slate-200'}`}>{area.name}</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* COL 2: MACHINES - w-[27%] */}
                        <div className="w-[27%] flex flex-col z-10 pl-2 pr-1 h-full" onClick={e => e.stopPropagation()}>
                            <div className="flex items-center gap-2 px-2 text-blue-300 mb-2 border-b border-white/5 pb-1 flex-none">
                                <LucideIcon name="Wrench" size={16} />
                                <h3 className="text-xs font-black uppercase tracking-widest text-slate-200">Thiết bị</h3>
                            </div>
                            <div className="flex-1 overflow-y-auto custom-scroll pr-1 pb-4">
                                <div className="grid grid-cols-3 gap-3">
                                    {machines.map((machine) => {
                                        const isSelected = selectedMachineId === machine.id;
                                        const isConnected = flowActiveEntities.machineIds.has(machine.id);
                                        const isFaded = (activePackage || selectedMachineId || selectedChemicalId || selectedToolId) && !isConnected;

                                        return (
                                            <div
                                                key={machine.id}
                                                id={`machine-${machine.id}`}
                                                onClick={() => { setSelectedMachineId(prev => prev === machine.id ? null : machine.id); setSelectedChemicalId(null); setSelectedToolId(null); }}
                                                className={`machine-card-glass flex flex-col items-center text-center p-2 rounded-xl cursor-pointer select-none transition-all duration-300 ${isSelected ? 'border-yellow-400 ring-1 ring-yellow-400 scale-105 z-10 bg-yellow-400/10' : 'border-slate-800'} ${isFaded ? 'opacity-20 blur-[0.5px]' : 'opacity-100'}`}
                                            >
                                                <div className="w-10 h-10 bg-white rounded-lg p-0.5 flex items-center justify-center shrink-0 overflow-hidden"><img src={machine.image} className="w-full h-full object-contain" /></div>
                                                <h4 className="text-[1.3vmin] font-black leading-tight mt-1.5 truncate w-full px-1">{machine.name}</h4>
                                                <span className="text-[1vmin] truncate w-full px-1 text-slate-400 mt-0.5 leading-none">{machine.type}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* COL 3: CHEMICALS - w-[27%] */}
                        <div className="w-[27%] flex flex-col z-10 pl-2 pr-1 h-full" onClick={e => e.stopPropagation()}>
                            <div className="flex items-center gap-2 px-2 text-blue-300 mb-2 border-b border-white/5 pb-1 flex-none">
                                <LucideIcon name="Droplet" size={16} />
                                <h3 className="text-xs font-black uppercase tracking-widest text-slate-200">Hóa chất</h3>
                            </div>
                            <div className="flex-1 overflow-y-auto custom-scroll pr-1 pb-4">
                                <div className="grid grid-cols-3 gap-3">
                                    {chemicals.map((chemical) => {
                                        const isSelected = selectedChemicalId === chemical.id;
                                        const isConnected = flowActiveEntities.chemicalIds.has(chemical.id);
                                        const isFaded = (activePackage || selectedMachineId || selectedChemicalId || selectedToolId) && !isConnected;

                                        return (
                                            <div
                                                key={chemical.id}
                                                id={`chemical-${chemical.id}`}
                                                onClick={() => { setSelectedChemicalId(prev => prev === chemical.id ? null : chemical.id); setSelectedMachineId(null); setSelectedToolId(null); }}
                                                className={`machine-card-glass flex flex-col items-center text-center p-2 rounded-xl cursor-pointer select-none transition-all duration-300 ${isSelected ? 'border-yellow-400 ring-1 ring-yellow-400 scale-105 z-10 bg-yellow-400/10' : 'border-slate-800'} ${isFaded ? 'opacity-20 blur-[0.5px]' : 'opacity-100'}`}
                                            >
                                                <div className="w-10 h-10 bg-white rounded-lg p-0.5 flex items-center justify-center shrink-0 overflow-hidden"><img src={chemical.image} className="w-full h-full object-contain" /></div>
                                                <h4 className="text-[1.3vmin] font-black leading-tight mt-1.5 truncate w-full px-1">{chemical.name}</h4>
                                                <span className="text-[1vmin] truncate w-full px-1 text-slate-400 mt-0.5 leading-none">{chemical.type}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* COL 4: TOOLS - w-[28%] */}
                        <div className="w-[28%] flex flex-col z-10 pl-2 pr-1 h-full" onClick={e => e.stopPropagation()}>
                            <div className="flex items-center gap-2 px-2 text-blue-300 mb-2 border-b border-white/5 pb-1 flex-none">
                                <LucideIcon name="Hammer" size={16} />
                                <h3 className="text-xs font-black uppercase tracking-widest text-slate-200">Dụng cụ / Phụ kiện</h3>
                            </div>
                            <div className="flex-1 overflow-y-auto custom-scroll pr-1 pb-4">
                                <div className="grid grid-cols-3 gap-3">
                                    {tools.map((tool) => {
                                        const isSelected = selectedToolId === tool.id;
                                        const isConnected = flowActiveEntities.toolIds.has(tool.id);
                                        const isFaded = (activePackage || selectedMachineId || selectedChemicalId || selectedToolId) && !isConnected;

                                        return (
                                            <div
                                                key={tool.id}
                                                id={`tool-${tool.id}`}
                                                onClick={() => { setSelectedToolId(prev => prev === tool.id ? null : tool.id); setSelectedMachineId(null); setSelectedChemicalId(null); }}
                                                className={`machine-card-glass flex flex-col items-center text-center p-2 rounded-xl cursor-pointer select-none transition-all duration-300 ${isSelected ? 'border-yellow-400 ring-1 ring-yellow-400 scale-105 z-10 bg-yellow-400/10' : 'border-slate-800'} ${isFaded ? 'opacity-20 blur-[0.5px]' : 'opacity-100'}`}
                                            >
                                                <div className="w-10 h-10 bg-white rounded-lg p-0.5 flex items-center justify-center shrink-0 overflow-hidden"><img src={tool.image} className="w-full h-full object-contain" /></div>
                                                <h4 className="text-[1.3vmin] font-black leading-tight mt-1.5 truncate w-full px-1">{tool.name}</h4>
                                                <span className="text-[1vmin] truncate w-full px-1 text-slate-400 mt-0.5 leading-none">{tool.type}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                    </main>

                    {/* DYNAMIC INFOPANEL (Detail card) */}
                    {selectedEntity && (
                        <div className="fixed bottom-4 right-24 bg-slate-900/95 text-white p-5 rounded-2xl shadow-2xl border border-slate-700 backdrop-blur-md z-40 w-80 flex flex-col gap-4 max-h-[50vh] overflow-y-auto custom-scroll animate-slide-in-right" onClick={e => e.stopPropagation()}>
                            <div className="flex items-center gap-4 border-b border-slate-700 pb-3">
                                <div className="w-16 h-16 bg-white rounded-xl flex items-center justify-center p-1.5 shrink-0 shadow-lg border-2 border-yellow-400 overflow-hidden">
                                    <img src={selectedEntity.image} className="w-full h-full object-contain" />
                                </div>
                                <div>
                                    <h3 className="font-bold text-base text-accent-yellow leading-tight truncate">{selectedEntity.name}</h3>
                                    <p className="text-[10px] text-slate-400 mt-1 uppercase tracking-wider font-semibold truncate">{selectedEntity.type}</p>
                                </div>
                            </div>
                            <div className="space-y-3.5 text-xs">
                                <div className="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                                    <h4 className="text-accent-yellow font-bold mb-1 text-[10px] uppercase flex items-center gap-1"><LucideIcon name="Info" size={12}/> Mô tả chức năng</h4>
                                    <p className="text-slate-300 leading-relaxed text-xs">{activeDesc}</p>
                                </div>
                                {activeFreq && (
                                    <div className="bg-blue-900/30 border border-blue-500/30 rounded-xl p-2 flex gap-2 items-center">
                                        <LucideIcon name="Clock" size={14} className="text-blue-400"/>
                                        <div>
                                            <span className="text-[9px] font-bold text-blue-300 uppercase block mb-0.5">Tần suất làm sạch</span>
                                            <span className="text-xs font-semibold text-white">{activeFreq}</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* AI ASSISTANT CHAT PANEL */}
                    <div className="fixed bottom-5 right-5 z-50 flex items-center select-none" onClick={e => e.stopPropagation()}>
                        <div className="absolute -top-1 -left-1 w-6 h-6 bg-white hover:bg-slate-100 rounded-full flex items-center justify-center shadow-lg cursor-pointer hover:scale-110 transition-transform duration-200 z-50 border border-slate-200" onClick={(e) => window.open('https://notebooklm.google.com/notebook/ddf466f3-ed1c-42ec-b56a-8a069658793e', '_blank')}>
                            <LucideIcon name="ExternalLink" size={12} color="#000" />
                        </div>
                        <button onClick={() => setIsOpen(!isOpen)} className={`w-14 h-14 rounded-full bg-gradient-to-r from-yellow-400 to-yellow-500 flex items-center justify-center shadow-2xl cursor-pointer hover:scale-108 transition-all duration-300 border-2 border-white/20 ${isOpen ? 'rotate-90' : ''}`}>
                            {isOpen ? <LucideIcon name="X" size={24} color="#000" /> : <LucideIcon name="MessageSquare" size={24} color="#000" />}
                        </button>
                    </div>

                    {isOpen && (
                        <div className="ai-chat-window animate-slide-in-right" onClick={e => e.stopPropagation()}>
                            <div className="ai-header">
                                <div className="flex items-center gap-2"><LucideIcon name="Bot" size={20} /><span className="font-bold tracking-wide text-sm">Karcher AI Assistant</span></div>
                                <button onClick={() => setIsOpen(false)} className="hover:bg-black/15 p-1 rounded-lg cursor-pointer"><LucideIcon name="Minus" size={16} /></button>
                            </div>
                            <div className="ai-body custom-scroll">
                                {messages.map(msg => <div key={msg.id} className={`ai-message ${msg.sender === 'user' ? 'user shadow-sm' : 'bot shadow-md'}`}>{msg.text}</div>)}
                            </div>
                            <div className="ai-footer flex gap-2">
                                <input type="text" className="flex-1 bg-slate-900/60 border border-slate-700 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-yellow-400 text-white" placeholder="Hỏi trợ lý Karcher..." value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend()} />
                                <button onClick={handleSend} className="bg-yellow-400 hover:bg-yellow-300 text-black p-2.5 rounded-xl cursor-pointer flex items-center justify-center"><LucideIcon name="Send" size={14} /></button>
                            </div>
                        </div>
                    )}

                    {/* AUTH LOGIN MODAL */}
                    {showLogin && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] px-4 backdrop-blur-sm" onClick={e => e.stopPropagation()}>
                            <form onSubmit={(e) => { e.preventDefault(); setIsAdmin(true); setShowLogin(false); }} className="w-full max-w-md glass-modal rounded-2xl border border-white/10 p-6 flex flex-col relative animate-slide-in-right">
                                <button onClick={() => setShowLogin(false)} type="button" className="absolute top-4 right-4 text-slate-400 hover:text-white cursor-pointer"><LucideIcon name="X" size={20} /></button>
                                <div className="flex items-center gap-2 mb-6">
                                    <div className="p-2 bg-yellow-400/20 text-yellow-400 rounded-lg"><LucideIcon name="Lock" size={24} /></div>
                                    <div><h2 className="text-xl font-bold text-white">Đăng nhập Admin</h2><p className="text-xs text-slate-400">Trình giả lập offline</p></div>
                                </div>
                                <div className="mb-4 p-3 bg-blue-500/10 border border-blue-500/20 rounded-xl text-xs text-slate-300">
                                    Mọi thông tin đăng nhập sẽ được duyệt ngay để phục vụ Claude Design.
                                </div>
                                <div className="space-y-4">
                                    <div><label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">Email</label><input type="email" required className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white" placeholder="admin@haus.vn" /></div>
                                    <div><label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">Mật khẩu</label><input type="password" required className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white" placeholder="••••••••" /></div>
                                    <Button type="submit" variant="primary" className="w-full py-2.5 mt-2">Đăng nhập ngay</Button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* CONFIG CRUD PANEL */}
                    {showConfig && (
                        <div className="fixed inset-y-0 right-0 w-[50vw] bg-slate-950/95 border-l border-white/10 shadow-2xl z-[80] backdrop-blur-xl flex flex-col p-6 animate-slide-in-right" onClick={e => e.stopPropagation()}>
                            <div className="flex justify-between items-center border-b border-white/10 pb-4 mb-4">
                                <div className="flex items-center gap-2"><LucideIcon name="Settings" size={22} className="text-yellow-400" /><h2 className="text-lg font-black uppercase text-white tracking-wider">Bảng điều khiển Admin</h2></div>
                                <button onClick={() => setShowConfig(false)} className="text-slate-400 hover:text-white cursor-pointer"><LucideIcon name="X" size={24} /></button>
                            </div>
                            <div className="mb-4 p-2 bg-yellow-500/10 border border-yellow-500/20 text-yellow-400 rounded-xl text-[10px] flex gap-2 items-center leading-normal">
                                <LucideIcon name="AlertTriangle" size={14} className="shrink-0" />
                                <span>Chế độ giả lập Claude Design. Mọi thao tác Thêm/Sửa/Xóa sẽ diễn ra trên bộ nhớ tạm thời của trình duyệt.</span>
                            </div>
                            <div className="flex-1 flex items-center justify-center text-xs text-slate-400 italic">
                                Biểu mẫu CRUD mô-đun hóa được tích hợp sẵn dưới dạng mã nguồn React TSX hoàn chỉnh để bạn đưa vào thiết kế!
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
