<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sơ đồ tư duy máy Karcher (V3.43 - AI Link Right Side)</title>
    
    <!-- 1. Cài đặt Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Cài đặt React và ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Cài đặt Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Style tùy chỉnh -->
    <style>
        :root {
            --bg-deep: #000428;
            --bg-mid: #004e92;
            --accent-yellow: #FFED00;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --glass-bg: rgba(0, 78, 146, 0.25);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            font-size: 1.4vmin;
        }

        /* Animated Background */
        .bg-animated {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);
            overflow: hidden;
        }
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.3;
            animation: float 20s infinite alternate ease-in-out;
        }
        .blob-1 { top: -20%; left: -10%; width: 70vw; height: 70vw; background: #004e92; animation-duration: 30s; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #000428; animation-duration: 35s; animation-direction: alternate-reverse; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.05); }
        }
        
        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        
        .machine-card-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }
        .machine-card-glass:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3);
        }

        /* Logo Style */
        .karcher-logo-box {
            background-color: var(--accent-yellow);
            color: #000;
            font-weight: 900;
            letter-spacing: -0.03em;
            padding: 2px 10px;
            font-size: 1.4rem;
            line-height: 1;
            border-radius: 2px;
            display: inline-block;
            transform: skew(-12deg);
            box-shadow: 3px 3px 0px rgba(0,0,0,0.4);
        }
        .karcher-logo-box span { display: inline-block; transform: skew(12deg); }

        /* Flow Line */
        @keyframes flow {
            to { stroke-dashoffset: 0; }
        }
        .flow-line {
            stroke-dasharray: 6, 6;
            stroke-dashoffset: 24;
            animation: flow 1s linear infinite; 
            filter: drop-shadow(0 0 4px var(--accent-yellow));
        }

        /* Highlight */
        .special-highlight {
            box-shadow: 0 0 0 1px var(--accent-yellow), 0 0 15px rgba(255, 237, 0, 0.4);
            border-color: var(--accent-yellow) !important;
            z-index: 10;
            background: rgba(255, 237, 0, 0.1) !important;
        }
        
        .area-selected {
            background: rgba(255, 237, 0, 0.2) !important;
            border-color: var(--accent-yellow) !important;
            box-shadow: 0 0 15px rgba(255, 237, 0, 0.2);
        }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Text Utilities */
        .text-fluid-title { font-size: clamp(1rem, 2vmin, 1.8rem); }
        .text-machine-code { 
            font-size: 1.4vmin; 
            font-weight: 800; 
            color: #FFED00; 
            letter-spacing: 0.03em; 
            margin-top: 6px; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.8); 
        } 
        .text-machine-name { 
            font-size: 1vmin; 
            font-weight: 500; 
            color: #ffffff; 
            line-height: 1.2; 
            margin-top: 2px; 
            opacity: 0.9;
        }
        .text-accent-yellow { color: #FFED00; }
        
        /* Fixed Description Bar */
        .desc-bar {
            background: rgba(0, 4, 40, 0.6);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
        }
        
        /* AI Chat Window Styles */
        .ai-chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px; /* Right side */
            width: 350px;
            height: 450px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 237, 0, 0.3);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 100;
            overflow: hidden;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Inter', sans-serif;
        }
        
        .ai-header {
            background: linear-gradient(90deg, #FFED00, #F59E0B);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #000;
        }
        
        .ai-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0,0,0,0.2);
        }
        
        .ai-message {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 1.3vmin;
            line-height: 1.4;
            max-width: 85%;
            word-wrap: break-word;
        }
        
        .ai-message.bot {
            background: rgba(255,255,255,0.15);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            color: #fff;
        }
        
        .ai-message.user {
            background: rgba(255, 237, 0, 0.2);
            border: 1px solid rgba(255, 237, 0, 0.3);
            color: #FFED00;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-footer {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            gap: 8px;
        }

        .ai-btn-float {
            position: fixed;
            bottom: 20px;
            right: 20px; /* Right side */
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFED00, #F59E0B);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(250, 204, 21, 0.4);
            z-index: 90;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #000;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .ai-btn-float:hover { transform: scale(1.1) rotate(5deg); }
        
        .ai-link-btn {
            position: absolute;
            top: -10px;
            left: -10px; /* Left side of the main button */
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 91;
            transition: transform 0.2s;
        }
        .ai-link-btn:hover { transform: scale(1.2); }

        /* Fullscreen button at bottom left */
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 90;
            background: rgba(15, 23, 42, 0.8);
            color: #cbd5e1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
            cursor: pointer;
        }
        .fullscreen-btn:hover { background: rgba(30, 41, 59, 1); color: #fff; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* Animation */
        .animate-slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>

            let machines = [...(STANDARD_MAPPING[areaId] || [])];
            
            if (packageId === 'sau-xay-dung') machines = machines.map(m => m === 't11-1' ? 'nt40-1' : m);
            if (packageId === 'dinh-ky') machines = machines.map(m => m === 'sg4-4' ? 'sg4-2' : m);
            if (packageId === 've-sinh-xanh') {
                const allowed = ['sg4-2', 'sg4-4'];
                machines = machines.filter(m => allowed.includes(m));
                if (!machines.includes('sg4-2') && !machines.includes('sg4-4')) {
                    if (['curtain', 'sofa', 'glass', 'toilet', 'kitchen'].includes(areaId)) machines.push('sg4-2');
                }

            if (packageId === 'sau-tiec') {
                if (['living', 'kitchen', 'toilet'].includes(areaId)) machines = ['br30-4', 'sg4-2'];
                else if (['outdoor', 'basement'].includes(areaId)) machines = ['bds43', 'hd5-15'];
                else machines = [];
            }
            if (packageId === 'du-an-bien') {
                if (areaId === 'toilet') machines = ['sg4-2', 'bd17-5'];
                else if (areaId === 'outdoor') machines = ['km70-30', 'bds43', 'hd5-15', 'hd10-25', 'bd17-5'];
                else if (areaId === 'basement') machines = ['bds43', 'hd5-15', 'bd17-5']; 
            }
            return machines;

            if (isStandard && machineId !== 'nt40-1') results.push('chuyen-sau');
            if (isStandard && machineId !== 'nt40-1') results.push('dinh-ky');
            if (machineId === 'sg4-2') results.push('dinh-ky'); 
            if (machineId === 'nt40-1') results.push('sau-xay-dung');
            else if (isStandard && machineId !== 't11-1') results.push('sau-xay-dung');
            if (['sg4-2', 'sg4-4'].includes(machineId)) results.push('ve-sinh-xanh');
            if (['br30-4', 'sg4-2', 'bds43', 'hd5-15'].includes(machineId)) results.push('sau-tiec');
            if (isStandard || machineId === 'hd10-25') results.push('du-an-bien');
            results.push('theo-gio');
            return [...new Set(results)];

            if (machineId === 'nt40-1') Object.keys(STANDARD_MAPPING).forEach(areaId => { if (STANDARD_MAPPING[areaId].includes('t11-1')) areasSet.add(areaId); });

                   </div>

                   <h4 className="font-bold text-machine-code leading-tight truncate w-full px-1">{machine.name}</h4>
                   <span className="text-machine-name truncate text-slate-400">{machine.type}</span>
                   
                   {frequencyText && (
                       <div className="mt-1 text-[0.8vmin] bg-blue-100 text-blue-800 px-1 py-0.5 rounded font-bold border border-blue-200 shadow-sm whitespace-nowrap overflow-hidden text-ellipsis max-w-full">
                           {frequencyText}
                       </div>
                   )}
                 </div>
            );
        };

        const App = () => {
            const [activePackage, setActivePackage] = useState(null); 
            const [hoveredArea, setHoveredArea] = useState(null);
            const [selectedMachineId, setSelectedMachineId] = useState(null);
            const containerRef = useRef(null);
            const [lines, setLines] = useState([]);

            const toggleFullScreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch((e) => console.log(e));
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            };

            const calculateLines = () => {
                if (!containerRef.current) return;
                const newLines = [];
                const containerRect = containerRef.current.getBoundingClientRect();
                
                const machineElements = {}; 
                MACHINES.forEach(m => {
                    const el = document.getElementById(`machine-${m.id}`);
                    if(el) machineElements[m.id] = el;
                });

                AREAS.forEach(area => {
                    const areaEl = document.getElementById(`area-${area.id}`);
                    if (!areaEl) return;
                    const areaRect = areaEl.getBoundingClientRect();
                    const startX = areaRect.right - containerRect.left;
                    const startY = areaRect.top + areaRect.height / 2 - containerRect.top;
                    
                    let connectedMachines = [];
                    let lineColor = '#475569'; 
                    let lineWidth = 1;
                    let lineOpacity = 0.1;

                    if (activePackage) {
                        let machines = getMachinesForPackage(activePackage, area.id);
                        connectedMachines = machines;
                        
                        const pkg = PACKAGES.find(p => p.id === activePackage);
                        if (hoveredArea === area.id) {
                            lineColor = pkg.color; 
                            lineWidth = 2.5;
                            lineOpacity = 0.9;
                        } else if (hoveredArea) {
                            lineOpacity = 0.05;
                        } else {
                            // CLEAN MODE: Hide lines when package selected but no area hovered
                            lineColor = 'transparent';
                            lineWidth = 0;
                            lineOpacity = 0;
                        }
                        
                    } else if (selectedMachineId) {
                        const standardMachines = STANDARD_MAPPING[area.id] || [];
                        if (standardMachines.includes(selectedMachineId)) {
                             connectedMachines = [selectedMachineId];
                             lineColor = '#FACC15'; lineWidth = 3; lineOpacity = 0.9;
                        } else if (selectedMachineId === 'nt40-1' && standardMachines.includes('t11-1')) {
                             connectedMachines = ['nt40-1'];
                             lineColor = '#FACC15'; lineWidth = 3; lineOpacity = 0.9;
                        }
                    }

                    connectedMachines.forEach(machineId => {
                         const machineEl = machineElements[machineId];
                         if (!machineEl) return;
                         const machineRect = machineEl.getBoundingClientRect();
                         const endX = machineRect.left - containerRect.left;
                         const endY = machineRect.top + machineRect.height / 2 - containerRect.top;

                         let isFlowing = false;
                         if (activePackage && hoveredArea === area.id) isFlowing = true;
                         if (selectedMachineId && machineId === selectedMachineId) isFlowing = true;

                         newLines.push({
                            id: `${area.id}-${machineId}`,
                            startX, startY, endX, endY,
                            stroke: lineColor,
                            width: lineWidth,
                            opacity: lineOpacity,
                            isFlowing: isFlowing
                        });
                    });
                });
                setLines(newLines);
            };

            useEffect(() => {
                const timer = setTimeout(calculateLines, 100);
                window.addEventListener('resize', calculateLines);
                return () => {
                    window.removeEventListener('resize', calculateLines);
                    clearTimeout(timer);
                };
            }, [activePackage, hoveredArea, selectedMachineId]);

            const specialHighlights = useMemo(() => {
                if (activePackage) {
                    return getHighlightMachines(activePackage);
                }
                return [];
            }, [activePackage]);

            const contextualData = useMemo(() => {
                if (activePackage && hoveredArea) {
                    if (activePackage === 'theo-gio') return null;
                    const areaObj = AREAS.find(a => a.id === hoveredArea);
                    const machineIds = getMachinesForPackage(activePackage, hoveredArea);
                    return { area: areaObj, machines: machineIds };
                }
                return null;
            }, [activePackage, hoveredArea]);

            return (
                <div onClick={() => { setSelectedMachineId(null); setHoveredArea(null); }} className="h-full flex flex-col">
                    
                    {/* Header Compact */}
                    <header className="flex-none px-4 py-2 flex justify-between items-center glass-panel z-50 border-b border-white/10 h-[8vh]">
                        <div className="flex items-center gap-2">
                            <div className="karcher-logo-box text-sm"><span>KÄRCHER</span></div>
                            <h1 className="text-fluid-title font-black tracking-tight text-white uppercase hidden sm:block ml-3">Hệ Thống Thiết Bị Làm Sạch</h1>
                        </div>
                        
                        <div className="flex gap-2 overflow-x-auto custom-scroll mx-4">
                            {PACKAGES.map((pkg) => {
                                const isActive = activePackage === pkg.id;
                                // New logic: Check if selected machine belongs to this package
                                const isRelated = selectedMachineId && getPackagesUsingMachine(selectedMachineId).includes(pkg.id);
                                
                                const Icon = pkg.icon;
                                return (
                                    <button
                                        key={pkg.id}
                                        onClick={(e) => { e.stopPropagation(); setActivePackage(prev => prev === pkg.id ? null : pkg.id); setSelectedMachineId(null); setHoveredArea(null); }}
                                        className={`
                                            flex items-center justify-center gap-1 px-3 rounded-lg border transition-all duration-200 whitespace-nowrap text-[1.4vmin] font-bold uppercase tracking-wide pkg-btn
                                            ${isActive 
                                                ? 'bg-blue-600 border-blue-500 text-white shadow-lg scale-105' 
                                                : isRelated
                                                    ? 'bg-transparent border-slate-700 hover:border-slate-500' // No bg change
                                                    : 'bg-slate-800/60 border-slate-600 hover:bg-slate-700'}
                                        `}
                                        style={{ 
                                            // Only change text/icon color for related, keep bg dark
                                            color: isActive ? '#fff' : (isRelated ? pkg.color : '#94a3b8'), 
                                            borderColor: isActive ? pkg.color : (isRelated ? pkg.color : '#475569') 
                                        }}
                                    >
                                        <Icon size="1.8vmin" />
                                        <span>{pkg.name}</span>
                                    </button>
                                );
                            })}
                        </div>
                        <button onClick={toggleFullScreen} className="p-1.5 bg-slate-800 hover:bg-slate-700 rounded transition-colors text-slate-400"><Icons.Maximize size="2vmin"/></button>
                    </header>
                    
                    {/* Package Description Bar */}
                    <div className={`flex-none desc-bar py-1 px-6 text-center h-[4vh] ${activePackage ? '' : 'invisible'}`}>
                         <span className="text-fluid-pkg font-medium text-accent-yellow">{activePackage && PACKAGES.find(p => p.id === activePackage).desc}</span>
                    </div>

                    {/* Main Content Grid */}
                    <div className="flex-1 relative flex overflow-hidden main-content px-6 py-2 gap-8" ref={containerRef}>
                        
                        {/* SVG Layer */}
                        <svg className="absolute inset-0 w-full h-full pointer-events-none z-0">
                            {lines.map((line, i) => (
                                <path
                                    key={i}
                                    d={`M ${line.startX} ${line.startY} C ${line.startX + 60} ${line.startY}, ${line.endX - 60} ${line.endY}, ${line.endX} ${line.endY}`}
                                    fill="none"
                                    stroke={line.stroke}
                                    strokeWidth={line.width}
                                    strokeOpacity={line.opacity}
                                    className={`transition-all duration-300 ${line.isFlowing ? 'flow-line' : ''}`}
                                />
                            ))}
                        </svg>

                        {/* Areas Column (Left) - Adjusted spacing */}
                        <div className="w-1/4 flex flex-col justify-center gap-[0.5vh] z-10 custom-scroll overflow-y-auto pr-1" onClick={e => e.stopPropagation()}>
                            <div className="header-row flex items-center justify-start gap-2 px-2 text-blue-300">
                                <Icons.MapPin size="1.8rem" />
                                <h3 className="text-sm font-bold uppercase tracking-widest text-white">Khu vực</h3>
                            </div>
                            
                            {AREAS.map((area, index) => {
                                const Icon = area.icon;
                                const isDimmed = activePackage && hoveredArea && hoveredArea !== area.id;
                                const isActive = hoveredArea === area.id;
                                return (
                                    <div
                                        key={area.id}
                                        id={`area-${area.id}`}
                                        onMouseEnter={() => activePackage && activePackage !== 'theo-gio' && setHoveredArea(area.id)}
                                        onMouseLeave={() => activePackage && setHoveredArea(null)}
                                        className={`
                                            group relative px-2 py-1.5 rounded border transition-all duration-200 cursor-default flex items-center justify-between
                                            ${isActive ? 'bg-blue-900/40 border-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.3)] translate-x-1 area-selected' : 'bg-slate-800/40 border-slate-700 hover:bg-slate-800/60'}
                                            ${isDimmed ? 'opacity-20 blur-[0.5px]' : 'opacity-100'}
                                        `}
                                        style={{ height: '6.5vh' }} 
                                    >
                                        <div className="flex items-center gap-2 w-full">
                                            <div className={`p-1 rounded ${isActive ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400'}`}>
                                                <Icon size="2.2vmin" />
                                            </div>
                                            <span className={`text-[1.3vmin] font-bold uppercase tracking-wide truncate ${isActive ? 'text-accent-yellow' : 'text-white'}`}>{area.name}</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Machines Grid (Right) - 6 Columns */}
                        <div className="w-3/4 flex flex-col z-10 pl-4 h-full">
                             <div className="header-row flex items-center gap-2 px-2 text-blue-300">
                                <Icons.Wrench size="1.8rem" />
                                <h3 className="text-sm font-bold uppercase tracking-widest text-white">Thiết bị tương ứng</h3>
                           </div>
                           
                            <div className="flex-1 overflow-y-auto custom-scroll pr-2 pb-2">
                                {/* Changed to grid-cols-6 */}
                                <div className="grid grid-cols-6 gap-4 w-full">
                                    {MACHINES.map((machine) => {
                                        let isConnected = lines.some(l => l.endX > 0 && l.id.includes(machine.id) && l.opacity > 0.1);
                                        if(!activePackage && !selectedMachineId) isConnected = true;
                                        if(activePackage === 'theo-gio') isConnected = true;

                                        // New logic: if package active, show machines used in that package, even if not lines
                                        if (activePackage && !hoveredArea) {
                                             const pkgs = getPackagesUsingMachine(machine.id);
                                             if (pkgs.includes(activePackage)) isConnected = true;
                                             else isConnected = false;
                                        }

                                        let isFaded = !isConnected;
                                        const isSelected = selectedMachineId === machine.id;
                                        const isSpecialHighlight = activePackage && specialHighlights.includes(machine.id);

                                        return (
                                            <div 
                                                key={machine.id} 
                                                id={`machine-${machine.id}`}
                                                onClick={(e) => { e.stopPropagation(); setActivePackage(null); setSelectedMachineId(machine.id); }}
                                            >
                                                <MachineCard 
                                                    machine={machine} 
                                                    isConnected={isConnected} 
                                                    isFaded={isFaded}
                                                    isSelected={isSelected}
                                                    packageId={activePackage}
                                                    areaId={hoveredArea}
                                                    isSpecialHighlight={isSpecialHighlight && isConnected && !hoveredArea} 
                                                />
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                    </div>
                    {selectedMachineId && <InfoPanel machine={MACHINES.find(m => m.id === selectedMachineId)} activePackage={activePackage} hoveredArea={hoveredArea} allMappings={STANDARD_MAPPING} />}
                    {contextualData && <ContextualTooltip {...contextualData} packageId={activePackage} />}
                    
                    {/* Karcher AI Assistant Button - Right Side */}
                    <AIChat />
                    <button 
                        onClick={toggleFullScreen} 
                        className="fixed bottom-5 left-5 z-50 p-2 bg-slate-800/80 hover:bg-slate-700 rounded-lg text-slate-400 transition-colors border border-slate-700"
                        title="Toàn màn hình"
                    >
                        <Icons.Maximize size="24" />
                    </button>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
